name: alkhafajdashboard
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  supabase_flutter: ^2.12.0
  flutter_bloc: ^9.1.1
  get: ^4.7.3

  font_awesome_flutter: ^11.0.0
  google_fonts: ^8.0.2
  dropdown_search: ^6.0.2
  file_picker: ^10.3.2
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Zain
      fonts:
        - asset: assets/fonts/Zain-Regular.ttf
   
